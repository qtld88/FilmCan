name: FilmCan
options:
  bundleIdPrefix: com.filmcan
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    ARCHS: "arm64 x86_64"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    PRODUCT_NAME: FilmCan
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "22"
    ONLY_ACTIVE_ARCH: "NO"

targets:
  FilmCan:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.filmcan.app
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: NO
    entitlements:
      path: Sources/FilmCan.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true

  FilmCanTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: FilmCan
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FilmCan.app/Contents/MacOS/FilmCan"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: Tests/Info.plist
        PRODUCT_MODULE_NAME: FilmCanTests
        SWIFT_INSTALL_OBJC_HEADER: NO
